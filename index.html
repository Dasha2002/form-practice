<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="contact-form-section">
        <div class="container">
            <h1>Свяжитесь с нами</h1>
            <p>Заполните форму ниже, и наш менеджер перезвонит вам в ближайшее время.</p>
            <div itemscope itemtype="https://schema.org/ContactPage">
                <form id="contact-form" action="submit.php" method="POST" novalidate>
                    
                    <div class="form-group">
                        <label for="name">Ваше имя *</label>
                        <input type="text" id="name" name="name" required>
                        <div class="error-message" id="name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Ваш Email *</label>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Ваш телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" maxlength="18">
                        <div class="error-message" id="phone-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="message">Ваше сообщение</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                        <div class="error-message" id="message-error"></div>
                    </div>

                    <div id="form-success" class="form-message success" style="display: none;">
                        Спасибо! Ваша форма успешно отправлена. Мы свяжемся с вами в ближайшее время.
                    </div>
                    
                    <div id="form-error" class="form-message error" style="display: none;">
                        Произошла ошибка. Пожалуйста, попробуйте еще раз позже.
                    </div>

                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Отправить</span>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
